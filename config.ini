[watchdog]
# Intervalle de vérification en secondes
interval = 1

# Fichier de sortie JSON
output_file = printer_status.json

# Fichier de log (optionnel, laisser vide pour désactiver)
log_file = printer_watchdog.log

# Nombre maximum de logs à conserver (0 = illimité)
max_log_entries = 1000

# Nom de l'imprimante cible (détection par mot-clé)
target_printer = kodak
